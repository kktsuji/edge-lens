name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Skip forked PRs: repository secrets are not available in fork workflows
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@26ec041249acb0a944c0a47b6c0c13f05dbc5b44 # v1.0.70
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Review the pull request #${{ github.event.pull_request.number }} in this repository.

            1. Get the diff:
               git diff origin/${{ github.event.pull_request.base.ref }}...HEAD

            2. Read the CLAUDE.md file if it exists for project context.

            3. Analyze the diff for:
               - Bugs and logic errors
               - Security vulnerabilities
               - Missing error handling that could cause crashes
               - Breaking changes

            4. Post your review as a PR comment using:
               gh pr comment ${{ github.event.pull_request.number }} --body "<your review>"

            Focus on HIGH SIGNAL issues only. Do not flag style nits, minor suggestions, or subjective improvements.
            If there are no significant issues, post a short comment confirming the code looks good.
          additional_permissions: "Bash(git diff:*),Bash(git log:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
