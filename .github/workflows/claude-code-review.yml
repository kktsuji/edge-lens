name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Skip forked PRs: repository secrets are not available in fork workflows
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@26ec041249acb0a944c0a47b6c0c13f05dbc5b44 # v1.0.70
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            IMPORTANT: After the code review analysis is complete, you MUST post the review results
            as a PR comment using this command:
              gh pr comment ${{ github.event.pull_request.number }} --body "<review results>"

            Format the comment in markdown. Start the comment with "## Claude Code Review" as the heading.
            Include a summary of findings (bugs, security issues, logic errors) or state that no
            significant issues were found.
          additional_permissions: "Bash(gh pr comment:*),Bash(gh api:*)"
